openapi: 3.0.0
info:
  description: >
    This is the RESTful API for managing Moesif event publisher configurations in WSO2 Identity Server.
  version: "v1"
  title: WSO2 Identity Server - Moesif Publisher Management API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

paths:
  /moesif-publishers:
    post:
      tags:
        - Moesif Publishers
      summary: Create a Moesif event publisher
      operationId: createMoesifPublisher
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoesifPublisherReq'
        required: true
      responses:
        '201':
          description: Successfully created
          headers:
            Location:
              description: Location of the newly created resource.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoesifPublisher'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      tags:
        - Moesif Publishers
      summary: Get a Moesif event publisher by name
      operationId: getMoesifPublisher
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoesifPublisher'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
        - Moesif Publishers
      summary: Update the Moesif event publisher configuration
      operationId: updateMoesifPublisher
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoesifPublisherReq'
        required: true
      responses:
        '200':
          description: Successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoesifPublisher'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - Moesif Publishers
      summary: Delete a Moesif event publisher
      operationId: deleteMoesifPublisher
      responses:
        '204':
          description: Successfully deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    MoesifPublisherReq:
      type: object
      required:
        - apiKeyValue
      properties:
        apiKeyValue:
          type: string
          description: Moesif collector API key value.
        publisherTypes:
          type: object
          additionalProperties:
            type: boolean
          description: >
            Map of publisher type key to enabled flag (e.g. {"login": true, "registration": false}).
            Keys absent from the map default to false (replace-all semantics).
            Known keys: "login", "registration", "flow".
    MoesifPublisher:
      type: object
      properties:
        name:
          type: string
        publisherTypes:
          type: object
          additionalProperties:
            type: boolean
          description: Map of publisher type key to current enabled flag.

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        description:
          type: string

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

openapi: 3.0.0
info:
  description: >
    This document specifies a **Debug RESTful API** for **WSO2 Identity Server**.
    This API supports debugging of various authentication flows and resource configurations.
    The APIs provide the capability to start and retrieve debug sessions for different resource types.
    OAuth2 scopes: `internal_debug_mgt_view` (read) and `internal_debug_mgt_update` (write).

  version: "1.0"
  title: WSO2 Identity Server - Debug API
  contact:
    name: WSO2
    url: 'http://wso2.com/products/identity-server/'
    email: architecture@wso2.org
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'

security:
  - OAuth2: []
  - BasicAuth: []

servers:
  - url: "/t/{tenant-domain}/api/server/v1"
    variables:
      tenant-domain:
        default: "carbon.super"
        description: "The tenant domain."

paths:
  /debug/{resourceType}:
    post:
      summary: "Start Debug Session"
      description: "Initiates a debug session for supported resource types with configurable properties."
      operationId: "startDebugSession"
      tags:
        - "Debug"
      security:
        - OAuth2: [internal_debug_mgt_update]
        - BasicAuth: []
      parameters:
        - name: "resourceType"
          in: "path"
          description: "Type of resource to debug. Allowed values: idp, fraud_detection."
          required: true
          schema:
            type: "string"
            minLength: 1
            maxLength: 50
            example: "idp"
      requestBody:
        description: "Debug request with connection identifier and optional properties."
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebugConnectionRequest"
      responses:
        '200':
          description: "Debug session executed successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugConnectionResponse"
        '400':
          description: "Bad Request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '403':
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: "Server Error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /debug/{debugId}/result:
    get:
      summary: "Get Debug Result"
      description: "Retrieves the debug results for a specific debug ID."
      operationId: "getDebugResult"
      tags:
        - "Debug"
      security:
        - OAuth2: [internal_debug_mgt_view]
        - BasicAuth: []
      parameters:
        - name: "debugId"
          in: "path"
          description: "The debug session identifier."
          required: true
          schema:
            type: "string"
      responses:
        '200':
          description: "Debug result retrieved successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugResult"
        '400':
          description: "Bad Request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '404':
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: "Server Error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://localhost:9443/oauth2/authorize
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            internal_debug_mgt_view: View debug sessions and results
            internal_debug_mgt_update: Create and manage debug sessions

  schemas:

    # -------------
    # Common Error
    # -------------
    Error:
      type: "object"
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "10001"
          description: "An error code."
        message:
          type: string
          example: "Error message."
          description: "An error message."
        description:
          type: string
          example: "Detailed error description."
          description: "A detailed error description."
        traceId:
          type: string
          example: "trace-123456"
          description: "Trace identifier for error correlation."

    # ---------------------------------
    # Debug Request/Response Models
    # ---------------------------------
    DebugConnectionRequest:
      type: object
      description: "Request body for starting a debug session."
      properties:
        connectionId:
          type: string
          minLength: 1
          maxLength: 255
          description: "Connection identifier for the selected resource type."
          example: "11cb1448-2c30-4f9f-af8e-426614174000"
    DebugConnectionResponse:
      type: object
      description: "Debug connection response containing generic debug information and resource-specific metadata."
      properties:
        debugId:
          type: string
          description: "Debug session identifier."
          example: "debug-496f5a3f-0094-42f2-8188-d2baa9a1287c"
        status:
          type: string
          description: "Status of the debug operation."
          enum: ["SUCCESS", "IN_PROGRESS", "FAILURE", "DIRECT_RESULT"]
          example: "SUCCESS"
        message:
          type: string
          description: "Generic response message."
          example: "Debug session executed successfully"
        timestamp:
          type: integer
          format: int64
          description: "Timestamp when the debug operation was processed (in milliseconds)."
          example: 1771217107937
        metadata:
          type: object
          description: "Resource-specific metadata. For IDP OAuth debugging, includes 'authorizationUrl'."
          properties:
            authorizationUrl:
              type: string
              description: "OAuth 2.0 authorization URL for IDP debugging."
              example: "https://api.asgardeo.io/t/linuka/oauth2/authorize?response_type=code&client_id=lfrTEyDGHBEUbeBKoiaosz1y8Aca&redirect_uri=https%3A%2F%2Flocalhost%3A9443%2Fcommonauth"

    # -----------------------------
    # GET /debug/{debugId}/result
    # -----------------------------
    DebugResult:
      type: object
      required:
        - debugId
        - status
      description: "Debug response containing debugId and status at top level, with all protocol-specific data in metadata."
      properties:
        debugId:
          type: string
          description: "Debug session identifier. Used to retrieve debug results via the GET endpoint."
          example: "debug-12345"
        status:
          type: string
          description: "Status of the debug operation."
          enum: ["SUCCESS", "IN_PROGRESS", "FAILURE", "DIRECT_RESULT"]
          example: "SUCCESS"
        metadata:
          type: object
          description: "Protocol-specific and resource-specific debug data. For IDP OAuth debugging, includes userAttributes, mappedClaims, steps, tokens, URLs, and diagnostic information."
          additionalProperties: true
          example:
            state: "debug-12345"
            userAttributes:
              sub: "9d5ddf10-d814-4000-9bf7-35f3eef9b86e"
              email: "user@example.com"
            mappedClaims:
              - idpClaim: "sub"
                isClaim: "http://wso2.org/claims/sub"
                value: "9d5ddf10-d814-4000-9bf7-35f3eef9b86e"
                status: "Auto-Discovered"
            steps:
              claimMappingStatus: "success"
              authenticationStatus: "success"
              connectionStatus: "success"
            idToken: "eyJ..."
            externalRedirectUrl: "https://..."
